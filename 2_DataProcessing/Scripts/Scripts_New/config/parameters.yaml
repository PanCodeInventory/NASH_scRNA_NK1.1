# 分析参数配置文件
# 配置scRNA-seq数据处理流程中的所有参数

# 预处理参数
preprocessing:
  nfeatures: 3000                    # 可变基因数量
  normalization_method: "SCT"         # 归一化方法
  integration_method: "SCT"            # 整合方法
  min_cells: 3                        # 基因最小细胞数
  min_features: 200                   # 细胞最小基因数
  max_features: 5000                  # 细胞最大基因数
  mt_threshold: 20                     # 线粒体基因百分比阈值

# 聚类参数
clustering:
  resolution_range: [0.2, 1.2]       # 分辨率搜索范围
  resolution_step: 0.1                # 分辨率步长
  dims_range: [10, 15, 20, 25, 30]  # 主成分数量候选
  algorithm: "louvain"                 # 聚类算法

# UMAP参数
umap:
  min_dist: 0.3                       # UMAP最小距离
  n_neighbors: 30                      # 邻居数量
  metric: "correlation"                # 距离度量

# 质量控制参数
quality_control:
  doublet_threshold: 0.25             # 双胞检测阈值
  doublet_expected: 0.06              # 期望双胞比例
  doublet_samples: "auto"             # 双胞检测样本分组
  
# SingleR注释参数
singler:
  ref_dataset: "ImmGenData"            # 参考数据集
  assay_type: "logcounts"              # 分析数据类型
  labels: "label.main"                  # 标签类型
  
# 细胞过滤参数
cell_filtering:
  remove_cell_types:                   # 需要去除的细胞类型
    - "NKT"
  keep_cell_types:                     # 需要保留的细胞类型（优先级高于remove）
    - "NK"
    - "ILC"
  filter_by_score: true                # 是否基于评分过滤
  score_threshold: 0.6                 # 评分阈值

# 参数调优参数
tuning:
  silhouette_min_clusters: 2            # 轮廓系数最小簇数
  max_clusters: 20                     # 最大簇数
  min_cluster_fraction: 0.005          # 最小簇比例
  top_candidates_per_dims: 1            # 每个维度的最佳候选数
  global_top_candidates: 6              # 全局最佳候选数

# 可视化参数
visualization:
  plot_width: 10                       # 图件宽度
  plot_height: 8                       # 图件高度
  dpi: 300                            # 分辨率
  formats: ["png", "pdf", "svg"]       # 输出格式
  color_palette: "Set2"                # 配色方案
  label_size: 4                        # 标签大小
  legend_position: "right"              # 图例位置

# 输出参数
output:
  save_intermediate: true               # 是否保存中间结果
  create_reports: true                  # 是否生成报告
  backup_files: true                   # 是否备份文件
  compress_output: false                # 是否压缩输出

# 计算参数
computation:
  n_threads: 4                        # 线程数
  memory_limit: "8GB"                 # 内存限制
  seed: 1234                          # 随机种子
  verbose: true                        # 详细输出