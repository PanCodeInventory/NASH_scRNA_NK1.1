input_h5ad: "../2_ClusterEditor/results/renamed/merged.processed.pruned.renamed.h5ad"
output_dir: "results"

theme:
  font_size: 14
  font_family: "Arial"
  aspect_ratio: 1

plots:
  - name: "umap_clusters"
    type: "umap"
    color_by: "cluster_annot"
    title: "Cell Clusters"
    palette: "elegant"
    point_size: 0.5

  - name: "umap_group"
    type: "umap"
    color_by: "cluster_annot"
    facet_by: "time"
    title: "Cell Clusters by Time"
    palette: "elegant"
    point_size: 0.5

  - name: "composition_stack"
    type: "proportion"
    group_by: "time"
    fill_by: "cluster_annot"
    position: "fill"
    title: "Cell Type Composition by Time"
    palette: "elegant"

  - name: "marker_expression"
    type: "dotplot"
    group_by: "cluster_annot"
    title: "Marker Gene Expression"
    
  - name: "composition_river"
    type: "river"
    group_by: "time"
    fill_by: "cluster_annot"
    title: "Cell Type Composition Changes Over Time"

# 标记基因定义 - 与 cluster_annot 列的值完全匹配
